<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindIt Nawasena - Login Sarpras</title>
    <!-- CSS Utama -->
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Style tambahan untuk sarpras */
        .badge-sarpras {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 10px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
            animation: fadeInOnly 0.8s ease-out 2.2s forwards;
            opacity: 0;
        }
        
        .btn-back {
            background-color: #6c757d !important;
            margin-top: 10px;
        }
        
        .btn-back:hover {
            background-color: #5a6268 !important;
        }
        
        .back-link {
            margin-top: 20px;
            text-align: center;
        }
        
        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .back-link a:hover {
            color: #ff6b6b;
        }
    </style>
</head>
<body>

    <div class="layer-top"></div>
    <div class="layer-bottom"></div>

    <div class="main-wrapper">
        
        <div class="brand-logo">
            <img src="images/logo.png" alt="Logo FindIt" class="logo-img">
        </div>

        <div class="content">
            
            <div class="welcome-text">
                <h1>Sarpras</h1>
                <h1>Login Portal</h1>
            </div>

            <div class="login-box-container">
                <div class="login-card">
                    <h2>LOGIN SARPRAS</h2>

                    <form id="loginSarprasForm">

                        <div class="input-group">
                            <input 
                                type="text"
                                id="username"
                                placeholder="Username"
                                required
                            >
                        </div>

                        <div class="input-group">
                            <input 
                                type="password"
                                id="password"
                                placeholder="Password"
                                required
                            >
                        </div>

                        <div id="errorMsg" style="color: red; font-size: 14px; margin-bottom: 10px; text-align: left;"></div>

                        <button type="submit" class="btn-login">Login Sarpras</button>

                        <button type="button" class="btn-login btn-back" 
                            onclick="window.location.href='/'">
                            ← Kembali ke Login Mahasiswa
                        </button>

                    </form>
                </div>
            </div>

        </div>
    </div>

<script>
document.getElementById("loginSarprasForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorMsg = document.getElementById("errorMsg");

    // Reset error message
    errorMsg.textContent = "";

    // Validasi input tidak kosong
    if (username === "" || password === "") {
        errorMsg.textContent = "Username dan Password harus diisi!";
        return;
    }

    // Validasi panjang minimal
    if (username.length < 3) {
        errorMsg.textContent = "Username minimal 3 karakter!";
        return;
    }

    if (password.length < 4) {
        errorMsg.textContent = "Password minimal 4 karakter!";
        return;
    }

    // Kredensial login Sarpras (contoh - sesuaikan dengan kebutuhan)
    // Format: username: sarpras, password: admin123
    // Atau bisa ditambahkan multiple akun
    
    const validCredentials = [
        { username: "sarpras", password: "admin123" },
        { username: "admin", password: "sarpras123" },
        { username: "kepala", password: "sarpras2024" },
        { username: "staff", password: "staff123" }
    ];

    // Cek apakah username dan password cocok
    const isValid = validCredentials.some(cred => 
        cred.username === username && cred.password === password
    );

    if (isValid) {
        // Login berhasil
        Swal.fire({
            icon: 'success',
            title: 'Login Sarpras Berhasil!',
            text: 'Selamat datang, ' + username,
            confirmButtonText: 'Lanjut ke Dashboard',
            confirmButtonColor: '#004e98',
            background: '#ffffff',
            backdrop: `rgba(0,0,0,0.4)`
        }).then((result) => {
            if (result.isConfirmed) {
                // Redirect ke dashboard sarpras
                window.location.href = "dashboard_sarpras.html";
            }
        });
    } else {
        // Login gagal
        Swal.fire({
            icon: 'error',
            title: 'Login Gagal',
            text: 'Username atau password salah!',
            confirmButtonText: 'Coba Lagi',
            confirmButtonColor: '#ff6b6b'
        });
    }
});
</script>

</body>
</html>
