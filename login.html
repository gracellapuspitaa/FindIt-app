<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FindIt Nawasena - Login</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

/* TAMBAHAN AGAR JUDUL MASUK KE BOX HIJAU */
.welcome-section{
position:relative;
}

.welcome-content{
position:absolute;
top:50%;
left:100px;
transform:translateY(-50%);
z-index:2;
}

.welcome-title{
font-family:'Playfair Display', serif;
font-size:48px;
margin:0;
}

/* Tombol tamu */
.btn-guest {
    background: transparent !important;
    border: 2px solid #3C6E71 !important;
    color: #3C6E71 !important;
    margin-top: 5px;
    font-size: 13px;
}
.btn-guest:hover {
    background: #eff6f6 !important;
    transform: scale(1.02);
}

/* Fix mobile */
@media (max-width: 600px) {
    .welcome-content {
        position: relative;
        top: auto;
        left: auto;
        transform: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
    }
    .welcome-title {
        font-size: 26px;
        text-align: center;
    }
}

</style>

</head>

<body>

<div class="layer-top"></div>
<div class="layer-bottom"></div>

<div class="main-wrapper">

<!-- LOGO -->
<div class="brand-logo">
<img src="images/logo.png" class="logo-img">
</div>


<div class="content">

<!-- KIRI -->
<div class="welcome-section">

<svg class="blob-bg" viewBox="0 0 900 800" preserveAspectRatio="none">
<path fill="#3F6F6B"
d="
M0,0
L550,0
C700,120 700,280 620,400
C560,500 700,640 560,800
L0,800
Z
"/>
</svg>

<div class="welcome-content">

    <div class="welcome-text">
        <h1 class="welcome-title">Welcome To</h1>
        <h1 class="welcome-title">FindIt Nawasena</h1>
    </div>

    <img src="images/maskot.png" alt="Maskot FindIt" class="owl-img">

</div>

</div>


<!-- KANAN -->
<div class="login-area">

<div class="login-card">

<h2>LOGIN MAHASISWA</h2>

<form id="loginForm">

<div class="input-group">
<input 
type="text"
id="nim"
placeholder="NIM"
required
inputmode="numeric"
pattern="[0-9]*"
oninput="this.value = this.value.replace(/[^0-9]/g, '')"
>
</div>

<div class="input-group">
<input 
type="password"
id="password"
placeholder="Password"
required
>
</div>

<div id="errorMsg"></div>

<button type="submit" class="btn-login">Login</button>

<button type="button"
class="btn-login btn-sarpras"
onclick="window.location.href='login_sarpras.html'">
Login Sarpras
</button>

<!-- Tombol masuk sebagai tamu -->
<button type="button" class="btn-login btn-guest" onclick="masukSebagaiTamu()">
    👀 Lihat sebagai Tamu
</button>

<div class="forgot-password">
Forgot Your Password? Please Contact Admin
</div>

</form>

</div>

</div>

</div>
</div>

<script>
// ── LOGIN MAHASISWA ──
document.getElementById("loginForm").addEventListener("submit", async function(e) {
e.preventDefault();

const nim = document.getElementById("nim").value.trim();
const password = document.getElementById("password").value.trim();

const response = await fetch('/api/login', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ username: nim, password: password })
});

const result = await response.json();

if (result.success) {

localStorage.setItem("userLoggedIn", "true");
localStorage.setItem("namaUser", result.user.nama_lengkap);
localStorage.setItem("username", nim);
localStorage.removeItem("isGuest"); // pastikan flag tamu dihapus saat login normal

if(result.user.no_telp){
localStorage.setItem("userPhone", result.user.no_telp);
}

Swal.fire({
icon: 'success',
title: 'Login Berhasil!',
text: 'Selamat datang, ' + result.user.nama_lengkap,
confirmButtonText: 'OK'
}).then(()=>{
window.location.href="dashboard.html";
});

}else{

Swal.fire({
icon: 'error',
title: 'Login Gagal',
text: result.message
});

}

});

// ── MASUK SEBAGAI TAMU ──
function masukSebagaiTamu() {
    localStorage.clear();
    localStorage.setItem("isGuest", "true");
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
