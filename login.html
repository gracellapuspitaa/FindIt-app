<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindIt Nawasena - Login</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="layer-top"></div>
    <div class="layer-bottom"></div>

    <div class="main-wrapper">
        
        <div class="brand-logo">
            <img src="images/logo.png" alt="Logo FindIt" class="logo-img">
        </div>

        <div class="content">
            
            <div class="welcome-text">
                <h1>Welcome To</h1>
                <h1>FindIt Nawasena</h1>
            </div>

            <div class="login-box-container">
                <div class="login-card">
                    <h2>LOGIN</h2>

                    <form id="loginForm">

                        <div class="input-group">
                            <input 
                                type="text"
                                id="nim"
                                placeholder="NIM"
                                required
                                inputmode="numeric" 
                                pattern="[0-9]*"
                                /* Fungsi JS inline untuk mencegah input selain angka secara real-time */
                                oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                            >
                        </div>

                        <div class="input-group">
                            <input 
                                type="password"
                                id="password"
                                placeholder="Password"
                                required
                            >
                        </div>

                        <div id="errorMsg"></div>

                        <button type="submit" class="btn-login">Login</button>

                        <button type="button" class="btn-login btn-sarpras"
                            onclick="window.location.href='login_sarpras.html'">
                            Login Sarpras
                        </button>

                        <div class="forgot-password">
                            Forgot Your Password? Please Contact Admin
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>

<script>
/* Logika penanganan pengiriman form (Form Submission) */
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault(); // Menghentikan reload halaman otomatis

    // Mengambil data dari input dan menghapus spasi di awal/akhir
    const nim = document.getElementById("nim").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorMsg = document.getElementById("errorMsg");

    // Definisi Aturan Validasi (Regex)
    const nimRegex = /^[0-9]+$/; // Harus angka semua
    const passRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]+$/; // Harus ada huruf dan angka

    errorMsg.textContent = ""; // Reset pesan error setiap kali tombol diklik

    // Validasi input NIM
    if (!nimRegex.test(nim)) {
        errorMsg.textContent = "NIM harus berupa angka saja!";
        return; // Berhenti jika salah
    }

    // Validasi input Password
    if (!passRegex.test(password)) {
        errorMsg.textContent = "Password harus kombinasi huruf dan angka!";
        return; // Berhenti jika salah
    }

    // Jika semua validasi lolos, tampilkan SweetAlert sukses
    Swal.fire({
        icon: 'success',
        title: 'Login Valid!',
        text: 'Selamat datang ' + nim,
        confirmButtonText: 'OK'
    }).then(() => {
        // Redirect ke halaman dashboard setelah user klik OK
        window.location.href = "dashboard.html";
    });
});
</script>

</body>
</html>
