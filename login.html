<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindIt Nawasena - Login</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="layer-top"></div>
    <div class="layer-bottom"></div>

    <div class="main-wrapper">
        
        <div class="brand-logo">
            <img src="images/logo.png" alt="Logo FindIt" class="logo-img">
        </div>

        <div class="content">
            
            <div class="welcome-text">
                <h1>Welcome To</h1>
                <h1>FindIt Nawasena</h1>
            </div>

            <div class="login-box-container">
                <div class="login-card">
                    <h2>LOGIN</h2>

                    <form id="loginForm">

                        <div class="input-group">
                            <input 
                                type="text"
                                id="nim"
                                placeholder="NIM"
                                required
                                inputmode="numeric" 
                                pattern="[0-9]*"
                                /* Fungsi JS inline untuk mencegah input selain angka secara real-time */
                                oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                            >
                        </div>

                        <div class="input-group">
                            <input 
                                type="password"
                                id="password"
                                placeholder="Password"
                                required
                            >
                        </div>

                        <div id="errorMsg"></div>

                        <button type="submit" class="btn-login">Login</button>

                        <button type="button" class="btn-login btn-sarpras"
                            onclick="window.location.href='login_sarpras.html'">
                            Login Sarpras
                        </button>

                        <div class="forgot-password">
                            Forgot Your Password? Please Contact Admin
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>

<script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const nim = document.getElementById("nim").value.trim();
        const password = document.getElementById("password").value.trim();

        // Kirim data ke server (Node.js)
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: nim, password: password })
        });

        const result = await response.json();

            // ... kode fetch sebelumnya ...
        if (result.success) {
            // SIMPAN NAMA USER KE LOCAL STORAGE
            localStorage.setItem("namaUser", result.user.nama_lengkap);

            Swal.fire({
                icon: 'success',
                title: 'Login Berhasil!',
                text: 'Selamat datang, ' + result.user.nama_lengkap,
                confirmButtonText: 'OK'
            }).then(() => {
                window.location.href = "dashboard.html";
            });
        // ... kode error sebelumnya ...
        } else {
            Swal.fire({
                icon: 'error',
                title: 'Login Gagal',
                text: result.message
            });
        }
    });
</script>

</body>
</html>
