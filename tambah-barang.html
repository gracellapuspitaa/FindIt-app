<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Barang - FindIt Nawasena</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --orange: #FF6700;
            --blue-dark: #004E98;
            --bg-body: #F3F4F6;
            --text-main: #1F2937;
            --border-color: #E5E7EB;
        }

        body {
            background-color: var(--bg-body);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .form-container {
            background: #ffffff;
            width: 100%;
            max-width: 700px;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .form-header {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 35px;
        }

        .btn-back {
            position: absolute;
            left: 0;
            text-decoration: none;
            color: var(--blue-dark);
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .form-header h1 {
            font-size: 20px;
            font-weight: 800;
            margin: 0;
        }

        .photo-box {
            background: #F9FAFB;
            border: 2px dashed #D1D5DB;
            border-radius: 20px;
            padding: 35px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 25px;
        }

        .photo-box:hover {
            border-color: var(--orange);
            background: #FFF7ED;
        }

        .photo-box i { color: var(--orange); margin-bottom: 10px; }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) { .input-grid { grid-template-columns: 1fr; } }

        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; position: relative; }

        .input-group label { font-size: 13px; font-weight: 700; color: #4B5563; }

        input, textarea {
            padding: 14px 18px;
            border: 1.5px solid var(--border-color);
            border-radius: 14px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            border-color: var(--blue-dark);
            box-shadow: 0 0 0 4px rgba(0, 78, 152, 0.1);
        }

        /* ==========================================================
           CUSTOM DROPDOWN (PENGGANTI SELECT KUNO)
           ========================================================== */
        .custom-select {
            position: relative;
            width: 100%;
        }

        .select-button {
            padding: 14px 18px;
            border: 1.5px solid var(--border-color);
            border-radius: 14px;
            background: white;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .select-button:after {
            content: "\f078";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 12px;
            color: var(--blue-dark);
        }

        .select-button.active { border-color: var(--blue-dark); box-shadow: 0 0 0 4px rgba(0, 78, 152, 0.1); }

        .dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            margin-top: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none;
            z-index: 100;
            padding: 8px;
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-list div {
            padding: 12px 15px;
            cursor: pointer;
            border-radius: 10px;
            font-size: 14px;
            transition: 0.2s;
        }

        .dropdown-list div:hover {
            background: #F3F4F6;
            color: var(--blue-dark);
            font-weight: 600;
        }

        .custom-select.open .dropdown-list { display: block; }

        /* ==========================================================
           RADIO BUTTONS
           ========================================================== */
        .options { display: flex; gap: 10px; margin-top: 5px; }
        .options label { flex: 1; cursor: pointer; position: relative; }
        .options input[type="radio"] { display: none; }
        .options span {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: #F3F4F6;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #6B7280;
            transition: 0.3s;
        }
        .options input[type="radio"]:checked + span {
            background: var(--blue-dark);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 78, 152, 0.2);
        }

        .btn-submit {
            width: 100%; background: var(--blue-dark); color: white; border: none; padding: 18px;
            border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .btn-submit:hover { background: var(--orange); transform: translateY(-2px); box-shadow: 0 10px 15px rgba(255, 103, 0, 0.2); }
    </style>
</head>
<body>

    <div class="form-container">
        <header class="form-header">
            <a href="dashboard.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali</a>
            <h1>Upload Barang Temuan</h1>
        </header>

        <form id="formTambah">
            <div class="photo-box" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-camera fa-2x"></i>
                <p id="fileNameDisplay" style="margin: 5px 0; font-weight: 600;">Klik untuk Upload Foto Barang</p>
                <small>(Maksimal 2MB)</small>
                <input type="file" id="fileInput" hidden accept="image/*">
            </div>

            <div class="input-grid">
                <div class="input-group">
                    <label>Nama Barang</label>
                    <input type="text" placeholder="Kunci Motor Honda, Dompet, dll" required>
                </div>

                <div class="input-group">
                    <label>Lokasi Temu</label>
                    <div class="custom-select" id="selectLokasi">
                        <div class="select-button">Pilih Lokasi</div>
                        <div class="dropdown-list">
                            <div data-value="FEB">FEB</div>
                            <div data-value="FISIP">FISIP</div>
                            <div data-value="FPSI">FPSI</div>
                            <div data-value="FIB">FIB</div>
                            <div data-value="FASILITAS UMUM">FASILITAS UMUM</div>
                        </div>
                        <input type="hidden" name="lokasi" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Kategori</label>
                    <div class="custom-select" id="selectKategori">
                        <div class="select-button">Pilih Kategori</div>
                        <div class="dropdown-list">
                            <div data-value="Elektronik">Elektronik</div>
                            <div data-value="Dokumen">Dokumen</div>
                            <div data-value="Aksesoris">Aksesoris</div>
                            <div data-value="Perlengkapan">Perlengkapan</div>
                        </div>
                        <input type="hidden" name="kategori" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>WhatsApp Penemu</label>
                    <input type="tel" placeholder="0812xxxxxx" required>
                </div>
            </div>

            <div class="input-group">
                <label>Jenis Barang</label>
                <div class="options">
                    <label>
                        <input type="radio" name="jenis" value="tak-bertuan" checked onclick="toggleNamaField(false)">
                        <span>Tak Bertuan</span>
                    </label>
                    <label>
                        <input type="radio" name="jenis" value="bertuan" onclick="toggleNamaField(true)">
                        <span>Bertuan</span>
                    </label>
                </div>
            </div>

            <div id="fieldNama" class="input-group" style="display: none;">
                <label>Atas Nama Siapa?</label>
                <input type="text" id="inputNama" placeholder="Nama yang tertera di barang">
            </div>

            <div class="input-group">
                <label>Status Keberadaan</label>
                <div class="options">
                    <label>
                        <input type="radio" name="status" value="sarpras" checked>
                        <span>Di Sarpras</span>
                    </label>
                    <label>
                        <input type="radio" name="status" value="penemu">
                        <span>Dibawa Penemu</span>
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label>Deskripsi Detail</label>
                <textarea rows="3" placeholder="Jelaskan detail barangnya..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Simpan & Publikasikan</button>
        </form>
    </div>

    <script>
        // JAVASCRIPT UNTUK CUSTOM DROPDOWN
        document.querySelectorAll('.custom-select').forEach(select => {
            const btn = select.querySelector('.select-button');
            const list = select.querySelector('.dropdown-list');
            const hiddenInput = select.querySelector('input[type="hidden"]');

            btn.addEventListener('click', () => {
                select.classList.toggle('open');
                btn.classList.toggle('active');
            });

            list.querySelectorAll('div').forEach(option => {
                option.addEventListener('click', () => {
                    btn.innerText = option.innerText;
                    hiddenInput.value = option.getAttribute('data-value');
                    select.classList.remove('open');
                    btn.classList.remove('active');
                });
            });
        });

        // Tutup dropdown kalau klik di luar
        window.addEventListener('click', (e) => {
            if (!e.target.closest('.custom-select')) {
                document.querySelectorAll('.custom-select').forEach(s => {
                    s.classList.remove('open');
                    s.querySelector('.select-button').classList.remove('active');
                });
            }
        });

        // FUNGSI BAWAAN LAINNYA
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');

        fileInput.addEventListener('change', function() {
    const file = this.files[0]; // Mengambil file pertama yang diupload
    
    if (file) {
        // 1. Hitung ukuran file dalam MB (1024 * 1024 = 1.048.576 bytes)
        // .toFixed(2) supaya angkanya cantik, cuma 2 angka di belakang koma (cth: 5.24)
        const fileSizeInMB = (file.size / (1024 * 1024)).toFixed(2);

        // 2. Cek apakah file lebih besar dari 2MB
        if (file.size > 2 * 1024 * 1024) {
            // Kita pakai tanda ` (backtick) supaya bisa masukin variabel ${fileSizeInMB}
            Swal.fire({ 
                title: 'File Kamu Ketinggian :(', 
                text: `File kamu ${fileSizeInMB} MB nih, kegedean! Maksimal 2MB yaa. Yuk kompres!`, 
                icon: 'error',
                confirmButtonColor: '#FF6700'
            });

            this.value = ""; // Reset input biar kosong lagi
            fileNameDisplay.textContent = "Klik untuk Upload Foto Barang";
        } else {
            // Jika aman, tampilkan nama file dan ukurannya
            fileNameDisplay.textContent = `Terpilih: ${file.name} (${fileSizeInMB} MB)`;
            fileNameDisplay.style.color = "#004E98";
        }
    }
});

        function toggleNamaField(show) {
            const field = document.getElementById('fieldNama');
            field.style.display = show ? 'block' : 'none';
            document.getElementById('inputNama').required = show;
        }

        document.getElementById('formTambah').addEventListener('submit', function(e) {
            e.preventDefault();
            if (!fileInput.files[0]) {
                Swal.fire({ title: 'Foto Mana?', text: 'Upload foto dulu ya.', icon: 'warning' });
                return;
            }
            Swal.fire({ title: 'Mantap!', text: 'Barang berhasil di-upload.', icon: 'success' })
            .then(() => { window.location.href = "dashboard.html"; });
        });
    </script>
</body>
</html>
