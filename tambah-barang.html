<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Barang - FindIt Nawasena</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/tambah-barang.css">
</head>
<body>

    <div class="form-container">
        <header class="form-header">
            <a href="dashboard.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali</a>
            <h1>Upload Barang Temuan</h1>
        </header>

        <form id="formTambah">
            <div class="photo-box" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-camera fa-2x"></i>
                <p id="fileNameDisplay">Klik untuk Upload Foto Barang</p>
                <small>(Maksimal 2MB)</small>
                <input type="file" id="fileInput" hidden accept="image/*">
            </div>

            <div class="input-grid">
                <div class="input-group">
                    <label>Nama Barang</label>
                    <input type="text" id="namaBarang" placeholder="Kunci Motor Honda, Dompet, dll" required>
                </div>

                <div class="input-group">
                    <label>Lokasi Temu</label>
                    <div class="custom-select" id="selectLokasi">
                        <div class="select-button">Pilih Lokasi</div>
                        <div class="dropdown-list">
                            <div data-value="FEB">FEB</div>
                            <div data-value="FISIP">FISIP</div>
                            <div data-value="FIB">FK</div>
                            <div data-value="FPSI">FPSI</div>
                            <div data-value="FIB">FIB</div>
                            <div data-value="FIB">FT</div>
                            <div data-value="FASILITAS UMUM">FASILITAS UMUM</div>
                        </div>
                        <input type="hidden" name="lokasi" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Kategori</label>
                    <div class="custom-select" id="selectKategori">
                        <div class="select-button">Pilih Kategori</div>
                        <div class="dropdown-list">
                            <div data-value="Elektronik">Elektronik</div>
                            <div data-value="Dokumen">Dokumen</div>
                            <div data-value="Aksesoris">Aksesoris</div>
                            <div data-value="Perlengkapan">Perlengkapan</div>
                        </div>
                        <input type="hidden" name="kategori" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>WhatsApp Penemu</label>
                    <input type="tel" id="waPenemu" placeholder="0812xxxxxx" required>
                </div>
            </div>

            <div class="input-group">
                <label>Jenis Barang</label>
                <div class="options-row">
                    <label class="radio-option">
                        <input type="radio" name="jenis" value="Tak Bertuan" checked onclick="toggleNamaField(false)">
                        <span>Tak Bertuan</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="jenis" value="Bertuan" onclick="toggleNamaField(true)">
                        <span>Bertuan</span>
                    </label>
                </div>
            </div>

            <div id="fieldNama" class="input-group" style="display: none;">
                <label>Atas Nama Siapa?</label>
                <input type="text" id="inputNama" placeholder="Nama yang tertera di barang">
            </div>

            <div class="input-group">
                <label>Status Keberadaan</label>
                <div class="options-row">
                    <label class="radio-option">
                        <input type="radio" name="status" value="Di Sarpras" checked>
                        <span>Di Sarpras</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="status" value="Dibawa Penemu">
                        <span>Dibawa Penemu</span>
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label>Deskripsi Detail</label>
                <textarea id="deskripsi" rows="3" placeholder="Jelaskan detail barangnya..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Simpan & Publikasikan</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-frontend.js"></script>

    <script>
        // Logika Dropdown (Sama)
        document.querySelectorAll('.custom-select').forEach(select => {
            const btn = select.querySelector('.select-button');
            const list = select.querySelector('.dropdown-list');
            const hiddenInput = select.querySelector('input[type="hidden"]');
            btn.addEventListener('click', () => { select.classList.toggle('open'); btn.classList.toggle('active'); });
            list.querySelectorAll('div').forEach(option => {
                option.addEventListener('click', () => {
                    btn.innerText = option.innerText;
                    hiddenInput.value = option.getAttribute('data-value');
                    select.classList.remove('open'); btn.classList.remove('active');
                });
            });
        });

        window.addEventListener('click', (e) => {
            if (!e.target.closest('.custom-select')) {
                document.querySelectorAll('.custom-select').forEach(s => {
                    s.classList.remove('open'); s.querySelector('.select-button').classList.remove('active');
                });
            }
        });

        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const fileSizeInMB = (file.size / (1024 * 1024)).toFixed(2);
                if (file.size > 2 * 1024 * 1024) {
                    Swal.fire({ title: 'File Terlalu Besar', text: `Ukuran file: ${fileSizeInMB} MB. Maksimal 2MB!`, icon: 'error', confirmButtonColor: '#FF6700' });
                    this.value = ""; fileNameDisplay.textContent = "Klik untuk Upload Foto Barang";
                } else {
                    fileNameDisplay.textContent = `Terpilih: ${file.name} (${fileSizeInMB} MB)`;
                    fileNameDisplay.style.color = "#004E98";
                }
            }
        });

        function toggleNamaField(show) {
            const field = document.getElementById('fieldNama');
            field.style.display = show ? 'block' : 'none';
            document.getElementById('inputNama').required = show;
        }

        // PROSES SUBMIT KE SUPABASE
        document.getElementById('formTambah').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!fileInput.files[0]) {
                Swal.fire({ title: 'Foto Kosong', text: 'Mohon upload foto barang.', icon: 'warning' });
                return;
            }

            Swal.fire({ title: 'Mengupload Data...', text: 'Mohon tunggu sebentar.', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            try {
                const file = fileInput.files[0];
                const namaBarang = document.getElementById('namaBarang').value;
                const lokasi = document.querySelector('input[name="lokasi"]').value;
                const kategori = document.querySelector('input[name="kategori"]').value;
                const waPenemu = document.getElementById('waPenemu').value;
                const jenis = document.querySelector('input[name="jenis"]:checked').value;
                const inputNama = document.getElementById('inputNama').value;
                const statusLokasi = document.querySelector('input[name="status"]:checked').value;
                const deskripsi = document.getElementById('deskripsi').value;

                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;
                
                const { error: uploadError } = await supabaseClient.storage.from('items-images').upload(fileName, file);
                if (uploadError) throw uploadError;

                const { data: publicUrlData } = supabaseClient.storage.from('items-images').getPublicUrl(fileName);
                const imageUrl = publicUrlData.publicUrl;

                // INSERT DATA: Menyisipkan nim_pengupload dari localStorage
                const { error: insertError } = await supabaseClient
                    .from('items')
                    .insert([
                        {
                            nama_barang: namaBarang,
                            lokasi_temuan: lokasi,
                            kategori: kategori,
                            jenis_barang: jenis, 
                            nama_pemilik: jenis === 'Bertuan' ? inputNama : null,
                            status_lokasi: statusLokasi, 
                            deskripsi: deskripsi,
                            image_url: imageUrl,
                            id_penemu: waPenemu, 
                            status_barang: 'Ditemukan',
                            nim_pengupload: localStorage.getItem("username") // <--- BARIS PENTING
                        }
                    ]);

                if (insertError) throw insertError;

                Swal.fire({ title: 'Berhasil!', text: 'Barang telah dipublikasikan.', icon: 'success' })
                .then(() => { window.location.href = "dashboard.html"; });

            } catch (error) {
                console.error("Error:", error);
                Swal.fire({ title: 'Gagal!', text: error.message || 'Terjadi kesalahan saat upload.', icon: 'error' });
            }
        });
    </script>
</body>
</html>
